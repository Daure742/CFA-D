<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CFA Digital - Plateforme de gestion des formations en alternance" />
    <meta name="theme-color" content="#4f46e5" />
    <title>CFA Digital - Plateforme de Formation</title>
    
    <style>
      /* Fallback styles en cas de problème de chargement */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background-color: #f3f4f6;
        color: #111827;
      }
      
      #root {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #f3f4f6;
      }
      
      .loading-spinner {
        text-align: center;
      }
      
      .spinner {
        border: 4px solid #e5e7eb;
        border-top: 4px solid #4f46e5;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>Chargement de CFA Digital...</p>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Logs réseau pour debug
      console.log('📄 [HTML] Document chargé');
      console.log('🌐 [HTML] URL:', window.location.href);
      console.log('🔧 [HTML] Mode Développement:', import.meta.env.DEV);
      
      // Timeout pour détecter les erreurs de chargement
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('Chargement')) {
          console.warn('⚠️ [HTML] Application n\'a pas chargé après 10 secondes');
        }
      }, 10000);
    </script>
  </body>
</html>
